<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Quiniela Tinas Mundial 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
:root {
  --verde: #3a6b1a;
  --verde-claro: #5a9e28;
  --verde-brillante: #7acc35;
  --rojo: #c0392b;
  --rojo-claro: #e74c3c;
  --blanco: #f0f0e8;
  --negro: #080c06;
  --gris-oscuro: #111a0a;
  --gris-medio: #1e2e12;
  --gris-panel: #162010;
  --oro: #d4af37;
  --oro-claro: #f0d060;
  --scan: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Rajdhani',sans-serif;
  background:var(--negro);
  color:var(--blanco);
  min-height:100vh;
  overflow-x:hidden;
}
/* GRID BG */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(58,107,26,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(58,107,26,0.07) 1px, transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
}

/* HEADER */
.site-header{
  position:relative;
  z-index:10;
  padding:0;
  background: linear-gradient(180deg, #0a1206 0%, transparent 100%);
  border-bottom:1px solid var(--verde);
  box-shadow:0 0 30px rgba(90,158,40,0.3);
}
.header-top{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  padding:16px 20px 8px;
  flex-wrap:wrap;
}
.logo-wrap{
  width:70px;height:70px;
  border:2px solid var(--verde-claro);
  border-radius:4px;
  padding:4px;
  background:rgba(0,0,0,0.6);
  box-shadow:0 0 15px rgba(90,158,40,0.5),inset 0 0 15px rgba(0,0,0,0.5);
  flex-shrink:0;
}
.logo-wrap img{width:100%;height:100%;object-fit:contain;}
.title-block{text-align:center;}
.title-main{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(28px,6vw,64px);
  letter-spacing:4px;
  line-height:1;
  background:linear-gradient(180deg, #ffffff 0%, var(--verde-brillante) 50%, var(--verde) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
  filter:drop-shadow(0 0 20px rgba(90,158,40,0.8));
}
.title-sub{
  font-family:'Share Tech Mono',monospace;
  font-size:clamp(11px,2vw,14px);
  color:var(--verde-claro);
  letter-spacing:6px;
  text-transform:uppercase;
  margin-top:2px;
}
.header-stripe{
  display:grid;
  grid-template-columns:1fr 6px 1fr 6px 1fr;
  height:6px;
}
.stripe-verde{background:var(--verde-claro);}
.stripe-blanco{background:var(--blanco);}
.stripe-rojo{background:var(--rojo);}
.stripe-div{background:var(--negro);}

/* MAIN */
.app-wrap{
  position:relative;
  z-index:5;
  max-width:760px;
  margin:0 auto;
  padding:20px 16px 40px;
}

/* SCREENS */
.screen{display:none;}
.screen.active{display:block;}

/* PANEL */
.panel{
  background:var(--gris-panel);
  border:1px solid var(--verde);
  border-radius:4px;
  padding:24px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}
.panel::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg, transparent, var(--verde-claro), transparent);
}
.panel-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  letter-spacing:3px;
  color:var(--verde-brillante);
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:10px;
}
.panel-title::before{
  content:'';
  display:inline-block;
  width:4px;height:20px;
  background:var(--verde-claro);
}

/* FORM */
label{
  display:block;
  font-size:12px;
  letter-spacing:2px;
  color:var(--verde-claro);
  text-transform:uppercase;
  margin-bottom:4px;
  font-family:'Share Tech Mono',monospace;
}
input[type=text],input[type=password]{
  width:100%;
  background:rgba(0,0,0,0.5);
  border:1px solid var(--verde);
  border-radius:2px;
  color:var(--blanco);
  font-family:'Rajdhani',sans-serif;
  font-size:16px;
  padding:10px 14px;
  margin-bottom:14px;
  outline:none;
  transition:border-color 0.2s, box-shadow 0.2s;
}
input:focus{
  border-color:var(--verde-brillante);
  box-shadow:0 0 10px rgba(90,158,40,0.3);
}
.err{
  font-size:12px;
  color:var(--rojo-claro);
  margin-bottom:10px;
  font-family:'Share Tech Mono',monospace;
  letter-spacing:1px;
}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'Rajdhani',sans-serif;
  font-weight:700;
  font-size:15px;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:10px 22px;
  border-radius:3px;
  border:none;
  cursor:pointer;
  transition:all 0.15s;
}
.btn-verde{
  background:var(--verde-claro);
  color:#fff;
}
.btn-verde:hover{background:var(--verde-brillante);box-shadow:0 0 14px rgba(90,158,40,0.6);}
.btn-rojo{
  background:var(--rojo);
  color:#fff;
}
.btn-rojo:hover{background:var(--rojo-claro);}
.btn-ghost{
  background:transparent;
  border:1px solid var(--verde);
  color:var(--verde-claro);
}
.btn-ghost:hover{background:rgba(58,107,26,0.2);border-color:var(--verde-brillante);}
.btn-sm{font-size:12px;padding:5px 12px;letter-spacing:1px;}
.btn-full{width:100%;justify-content:center;margin-top:8px;}
.btn-link{
  background:none;border:none;
  color:var(--verde-claro);
  font-family:'Share Tech Mono',monospace;
  font-size:12px;cursor:pointer;
  text-decoration:underline;
  padding:4px 0;
}
.btn-link:hover{color:var(--verde-brillante);}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;}

/* TABS */
.tab-bar{
  display:flex;
  gap:2px;
  margin-bottom:16px;
  border-bottom:1px solid var(--verde);
  overflow-x:auto;
  padding-bottom:0;
}
.tab{
  font-family:'Bebas Neue',sans-serif;
  font-size:16px;
  letter-spacing:2px;
  padding:8px 18px;
  border:none;
  background:transparent;
  color:var(--gris-medio);
  color:#4a6a35;
  cursor:pointer;
  border-bottom:3px solid transparent;
  margin-bottom:-1px;
  white-space:nowrap;
  transition:all 0.15s;
}
.tab:hover{color:var(--verde-claro);}
.tab.active{
  color:var(--verde-brillante);
  border-bottom:3px solid var(--verde-brillante);
  background:rgba(90,158,40,0.08);
}

/* PHASE BUTTONS */
.phase-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.phase-btn{
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  letter-spacing:1px;
  padding:5px 14px;
  border-radius:2px;
  border:1px solid var(--verde);
  background:transparent;
  color:var(--verde-claro);
  cursor:pointer;
  transition:all 0.15s;
}
.phase-btn:hover{background:rgba(58,107,26,0.3);}
.phase-btn.active{
  background:var(--verde);
  color:#fff;
  box-shadow:0 0 8px rgba(58,107,26,0.5);
}

/* MATCH ROW */
.match-row{
  display:grid;
  grid-template-columns:1fr 36px 1fr auto;
  align-items:center;
  gap:6px;
  padding:7px 4px;
  border-bottom:1px solid rgba(58,107,26,0.25);
  font-size:14px;
}
.match-row:last-of-type{border-bottom:none;}
.t-local{text-align:right;font-weight:600;}
.t-vs{text-align:center;font-family:'Share Tech Mono',monospace;font-size:11px;color:#4a6a35;}
.t-visit{font-weight:600;}
.bet-btns{display:flex;gap:3px;}
.bet-btn{
  font-size:11px;font-weight:700;
  padding:3px 8px;
  border-radius:2px;
  border:1px solid #4a6a35;
  background:rgba(0,0,0,0.4);
  cursor:pointer;
  color:#4a6a35;
  font-family:'Share Tech Mono',monospace;
  transition:all 0.1s;
}
.bet-btn:hover{border-color:var(--verde-claro);color:var(--verde-claro);}
.bet-btn.sel-L{background:rgba(30,100,200,0.3);border-color:#4a90e2;color:#7ab8f5;}
.bet-btn.sel-E{background:rgba(180,140,0,0.3);border-color:#c9a800;color:#f0cc00;}
.bet-btn.sel-V{background:rgba(180,40,30,0.3);border-color:var(--rojo);color:#f06060;}
.result-display{display:flex;gap:5px;align-items:center;}

/* PILLS */
.pill{
  display:inline-block;
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  padding:2px 7px;
  border-radius:2px;
  font-weight:700;
  letter-spacing:1px;
}
.pill-L{background:rgba(30,100,200,0.25);border:1px solid #4a90e2;color:#7ab8f5;}
.pill-E{background:rgba(180,140,0,0.25);border:1px solid #c9a800;color:#f0cc00;}
.pill-V{background:rgba(180,40,30,0.25);border:1px solid var(--rojo);color:#f06060;}
.pill-ok{background:rgba(58,107,26,0.4);border:1px solid var(--verde-claro);color:var(--verde-brillante);}
.pill-miss{background:rgba(40,40,40,0.5);border:1px solid #333;color:#666;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-box{
  background:rgba(0,0,0,0.5);
  border:1px solid var(--verde);
  border-radius:3px;
  padding:12px 8px;
  text-align:center;
}
.stat-val{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;
  color:var(--verde-brillante);
  line-height:1;
  filter:drop-shadow(0 0 8px rgba(90,158,40,0.6));
}
.stat-lbl{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  color:#4a6a35;
  letter-spacing:1px;
  margin-top:3px;
}

/* RANKING */
.rank-row{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 8px;
  border-bottom:1px solid rgba(58,107,26,0.2);
  transition:background 0.15s;
}
.rank-row:last-child{border-bottom:none;}
.rank-row:hover{background:rgba(58,107,26,0.05);}
.rank-pos{
  font-family:'Share Tech Mono',monospace;
  font-size:13px;
  color:#4a6a35;
  width:24px;
  text-align:center;
  flex-shrink:0;
}
.rank-name{flex:1;font-weight:600;font-size:16px;}
.rank-pts{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;
  color:var(--verde-brillante);
  letter-spacing:1px;
}
.rank-me{
  background:rgba(58,107,26,0.15);
  border-left:3px solid var(--verde-claro);
  padding-left:5px;
}
.medal{font-size:16px;}

/* TOP NAV */
.top-nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:16px;
  flex-wrap:wrap;
  gap:8px;
}
.nav-user{
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  color:var(--verde-claro);
  letter-spacing:1px;
}
.nav-user span{color:var(--verde-brillante);font-weight:700;}

/* DIVIDER */
.divider{
  border:none;
  border-top:1px solid rgba(58,107,26,0.3);
  margin:14px 0;
}

/* ADMIN TAG */
.admin-tag{
  display:inline-block;
  background:rgba(192,57,43,0.2);
  border:1px solid var(--rojo);
  color:var(--rojo-claro);
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  letter-spacing:2px;
  padding:2px 8px;
  border-radius:2px;
  margin-bottom:12px;
}

.date-tag{
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  color:#4a6a35;
  letter-spacing:1px;
  margin-bottom:12px;
}
.locked-notice{
  font-family:'Share Tech Mono',monospace;
  font-size:11px;
  color:var(--rojo-claro);
  background:rgba(192,57,43,0.1);
  border:1px solid rgba(192,57,43,0.4);
  border-radius:2px;
  padding:7px 12px;
  margin-bottom:10px;
  letter-spacing:1px;
}
.saved-msg{
  font-family:'Share Tech Mono',monospace;
  font-size:12px;
  color:var(--verde-brillante);
  text-align:center;
  margin-top:8px;
  height:18px;
  transition:opacity 0.4s;
}

/* PARTICIPANT ROW */
.part-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 6px;
  border-bottom:1px solid rgba(58,107,26,0.2);
}
.part-row:last-child{border-bottom:none;}
.part-name{flex:1;font-weight:600;}
.part-info{font-family:'Share Tech Mono',monospace;font-size:11px;color:#4a6a35;}

/* SCROLL */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--negro);}
::-webkit-scrollbar-thumb{background:var(--verde);border-radius:2px;}

/* FOOTER */
.footer{
  text-align:center;
  font-family:'Share Tech Mono',monospace;
  font-size:10px;
  color:#2a4a1a;
  letter-spacing:2px;
  padding:20px 0 8px;
}

/* RESPONSIVE */
@media(max-width:500px){
  .stats-grid{grid-template-columns:1fr 1fr 1fr;}
  .stat-val{font-size:24px;}
  .match-row{font-size:12px;}
  .panel{padding:16px 12px;}
}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.screen.active{animation:fadeIn 0.25s ease;}
@keyframes glow{0%,100%{box-shadow:0 0 15px rgba(90,158,40,0.2);}50%{box-shadow:0 0 25px rgba(90,158,40,0.4);}}
.site-header{animation:glow 4s infinite;}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div class="logo-wrap">
      <img src="logo.png" alt="Tinas logo"/>
    </div>
    <div class="title-block">
      <div class="title-main">Quiniela Tinas Mundial 2026</div>
      <div class="title-sub">⚽ Copa del Mundo · 72 partidos · 3 fases</div>
    </div>
    <div class="logo-wrap">
      <img src="logo.png" alt="Tinas logo"/>
    </div>
  </div>
  <div class="header-stripe">
    <div class="stripe-verde"></div><div class="stripe-div"></div>
    <div class="stripe-blanco"></div><div class="stripe-div"></div>
    <div class="stripe-rojo"></div>
  </div>
</header>

<div class="app-wrap">

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="panel" style="max-width:400px;margin:30px auto;">
    <div class="panel-title">Acceso</div>
    <label>Tu nombre</label>
    <input type="text" id="login-name" placeholder="Ej: Juan García" autocomplete="username"/>
    <label>Contraseña</label>
    <input type="password" id="login-pass" placeholder="Tu contraseña" autocomplete="current-password"/>
    <div class="err" id="login-err"></div>
    <div class="btn-row">
      <button class="btn btn-verde" onclick="doLogin()">▶ Entrar</button>
      <button class="btn btn-ghost" onclick="show('screen-register')">Registrarse</button>
    </div>
    <hr class="divider"/>
    <button class="btn-link" onclick="show('screen-admin-login')">⚙ Acceso administrador</button>
  </div>
</div>

<!-- REGISTER -->
<div id="screen-register" class="screen">
  <div class="panel" style="max-width:400px;margin:30px auto;">
    <div class="panel-title">Registro</div>
    <label>Tu nombre completo</label>
    <input type="text" id="reg-name" placeholder="Ej: María López" autocomplete="username"/>
    <label>Contraseña</label>
    <input type="password" id="reg-pass" placeholder="Elige una contraseña" autocomplete="new-password"/>
    <label>Confirmar contraseña</label>
    <input type="password" id="reg-pass2" placeholder="Repite la contraseña" autocomplete="new-password"/>
    <div class="err" id="reg-err"></div>
    <div class="btn-row">
      <button class="btn btn-verde" onclick="doRegister()">▶ Crear cuenta</button>
      <button class="btn btn-ghost" onclick="show('screen-login')">← Regresar</button>
    </div>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="screen-admin-login" class="screen">
  <div class="panel" style="max-width:400px;margin:30px auto;">
    <div class="panel-title">Admin</div>
    <div class="admin-tag">ACCESO RESTRINGIDO</div>
    <label>Contraseña de administrador</label>
    <input type="password" id="admin-pass" placeholder="Contraseña admin"/>
    <div class="err" id="admin-err"></div>
    <div class="btn-row">
      <button class="btn btn-rojo" onclick="doAdminLogin()">▶ Entrar</button>
      <button class="btn btn-ghost" onclick="show('screen-login')">← Regresar</button>
    </div>
  </div>
</div>

<!-- USER SCREEN -->
<div id="screen-user" class="screen">
  <div class="top-nav">
    <div class="nav-user">Usuario: <span id="user-welcome"></span></div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">Salir ×</button>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="userTab('picks')">Mis picks</button>
    <button class="tab" onclick="userTab('puntos')">Mis puntos</button>
    <button class="tab" onclick="userTab('ranking')">Ranking</button>
  </div>
  <div id="user-tab-picks">
    <div class="phase-bar" id="user-phase-bar"></div>
    <div id="user-picks-content"></div>
  </div>
  <div id="user-tab-puntos" style="display:none;">
    <div id="user-puntos-content"></div>
  </div>
  <div id="user-tab-ranking" style="display:none;">
    <div id="user-ranking-content"></div>
  </div>
</div>

<!-- ADMIN SCREEN -->
<div id="screen-admin" class="screen">
  <div class="top-nav">
    <div class="nav-user"><span style="color:var(--rojo-claro)">⚙ ADMINISTRADOR</span></div>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()">Salir ×</button>
  </div>
  <div class="tab-bar">
    <button class="tab active" onclick="adminTab('results')">Resultados</button>
    <button class="tab" onclick="adminTab('participants')">Participantes</button>
    <button class="tab" onclick="adminTab('ranking')">Ranking</button>
  </div>
  <div id="admin-tab-results">
    <div class="phase-bar" id="admin-phase-bar"></div>
    <div id="admin-results-content"></div>
  </div>
  <div id="admin-tab-participants" style="display:none;">
    <div id="admin-participants-content"></div>
  </div>
  <div id="admin-tab-ranking" style="display:none;">
    <div id="admin-ranking-content"></div>
  </div>
</div>

</div><!-- app-wrap -->
<div class="footer">QUINIELA TINAS · MUNDIAL 2026 · HECHO CON ❤ EN MÉXICO</div>

// STATE stored in localStorage (GitHub Pages)
function loadState(){
  try{return JSON.parse(localStorage.getItem('quiniela-tinas')||'{}');}catch(e){return {};}
}
function saveState(s){
  localStorage.setItem('quiniela-tinas',JSON.stringify(s));
}
function getState(){
  const s=loadState();
  if(!s.users)s.users={};
  if(!s.results)s.results={};
  if(!s.picks)s.picks={};
  return s;
}

let currentUser=null,isAdmin=false,userPhase='Q1',adminPhase='Q1';

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function doLogin(){
  const name=document.getElementById('login-name').value.trim();
  const pass=document.getElementById('login-pass').value;
  const s=getState();
  if(!name||!pass){document.getElementById('login-err').textContent='Completa todos los campos.';return;}
  if(!s.users[name]){document.getElementById('login-err').textContent='Usuario no encontrado. ¿Ya te registraste?';return;}
  if(s.users[name].pass!==pass){document.getElementById('login-err').textContent='Contraseña incorrecta.';return;}
  document.getElementById('login-err').textContent='';
  currentUser=name;isAdmin=false;
  enterUser();
}

function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const pass2=document.getElementById('reg-pass2').value;
  if(!name||!pass){document.getElementById('reg-err').textContent='Completa todos los campos.';return;}
  if(pass!==pass2){document.getElementById('reg-err').textContent='Las contraseñas no coinciden.';return;}
  const s=getState();
  if(s.users[name]){document.getElementById('reg-err').textContent='Ese nombre ya está registrado.';return;}
  s.users[name]={pass};
  if(!s.picks[name])s.picks[name]={};
  saveState(s);
  currentUser=name;isAdmin=false;
  document.getElementById('reg-err').textContent='';
  enterUser();
}

function doAdminLogin(){
  const pass=document.getElementById('admin-pass').value;
  if(pass!==ADMIN_PASS){document.getElementById('admin-err').textContent='Contraseña incorrecta.';return;}
  document.getElementById('admin-err').textContent='';
  isAdmin=true;currentUser=null;
  enterAdmin();
}

function doLogout(){
  currentUser=null;isAdmin=false;
  show('screen-login');
  document.getElementById('login-name').value='';
  document.getElementById('login-pass').value='';
}

function enterUser(){
  document.getElementById('user-welcome').textContent=currentUser;
  buildPhaseBtns('user-phase-bar',userPhase,ph=>{userPhase=ph;buildPhaseBtns('user-phase-bar',userPhase,arguments.callee);renderUserPicks();});
  renderUserPicks();
  userTab('picks');
  show('screen-user');
}

function enterAdmin(){
  buildPhaseBtns('admin-phase-bar',adminPhase,ph=>{adminPhase=ph;buildPhaseBtns('admin-phase-bar',adminPhase,arguments.callee);renderAdminResults();});
  renderAdminResults();
  adminTab('results');
  show('screen-admin');
}

function buildPhaseBtns(containerId,active,cb){
  const el=document.getElementById(containerId);
  el.innerHTML=PHASES.map(p=>`<button class="phase-btn${p.id===active?' active':''}" onclick="(${cb.toString()})('${p.id}')">${p.label}</button>`).join('');
}

function userTab(tab){
  ['picks','puntos','ranking'].forEach((t,i)=>{
    document.getElementById('user-tab-'+t).style.display=t===tab?'block':'none';
    document.querySelectorAll('#screen-user .tab')[i].classList.toggle('active',t===tab);
  });
  if(tab==='puntos')renderUserPuntos();
  if(tab==='ranking')renderRanking('user-ranking-content',false);
}

function adminTab(tab){
  ['results','participants','ranking'].forEach((t,i)=>{
    document.getElementById('admin-tab-'+t).style.display=t===tab?'block':'none';
    document.querySelectorAll('#screen-admin .tab')[i].classList.toggle('active',t===tab);
  });
  if(tab==='participants')renderAdminParticipants();
  if(tab==='ranking')renderRanking('admin-ranking-content',true);
}

function renderUserPicks(){
  const ph=userPhase;
  const s=getState();
  const myPicks=(s.picks[currentUser]||{})[ph]||{};
  const results=(s.results||{})[ph]||{};
  const locked=Object.keys(results).length>0;
  const phInfo=PHASES.find(p=>p.id===ph);
  let html=`<div class="panel">`;
  html+=`<div class="date-tag">📅 ${phInfo.date}</div>`;
  if(locked)html+=`<div class="locked-notice">🔒 Fase con resultados — tus picks están bloqueados</div>`;
  MATCHES[ph].forEach((m,i)=>{
    const pick=myPicks[i];
    const result=results[i];
    let right='';
    if(locked){
      if(pick)right+=`<span class="pill pill-${pick}">${pick==='L'?'LOCAL':pick==='E'?'EMPATE':'VISITA'}</span>`;
      if(result&&pick)right+=pick===result?` <span class="pill pill-ok">✓</span>`:`<span class="pill pill-miss">✗</span>`;
      if(!pick)right+=`<span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#333;">—</span>`;
    }else{
      right=`<div class="bet-btns">
        <button class="bet-btn${pick==='L'?' sel-L':''}" onclick="setPick('${ph}',${i},'L')">L</button>
        <button class="bet-btn${pick==='E'?' sel-E':''}" onclick="setPick('${ph}',${i},'E')">E</button>
        <button class="bet-btn${pick==='V'?' sel-V':''}" onclick="setPick('${ph}',${i},'V')">V</button>
      </div>`;
    }
    html+=`<div class="match-row"><span class="t-local">${m[0]}</span><span class="t-vs">vs</span><span class="t-visit">${m[1]}</span><div class="result-display">${right}</div></div>`;
  });
  if(!locked)html+=`<button class="btn btn-verde btn-full" onclick="saveUserPicks()">▶ Guardar picks</button><div class="saved-msg" id="save-msg"></div>`;
  html+=`</div>`;
  document.getElementById('user-picks-content').innerHTML=html;
}

function setPick(ph,idx,val){
  const s=getState();
  if(!s.picks[currentUser])s.picks[currentUser]={};
  if(!s.picks[currentUser][ph])s.picks[currentUser][ph]={};
  if(s.picks[currentUser][ph][idx]===val)delete s.picks[currentUser][ph][idx];
  else s.picks[currentUser][ph][idx]=val;
  saveState(s);
  renderUserPicks();
}

function saveUserPicks(){
  const el=document.getElementById('save-msg');
  if(el){el.textContent='✓ Picks guardados correctamente';setTimeout(()=>{el.textContent='';},2500);}
}

function calcPoints(user){
  const s=getState();
  let total=0,detail={};
  PHASES.forEach(ph=>{
    const results=(s.results||{})[ph.id]||{};
    const picks=(s.picks[user]||{})[ph.id]||{};
    let pts=0;
    Object.keys(results).forEach(i=>{if(picks[i]&&picks[i]===results[i])pts++;});
    detail[ph.id]=pts;total+=pts;
  });
  return{total,detail};
}

function countPicks(user){
  const s=getState();
  let n=0;
  PHASES.forEach(ph=>{n+=Object.keys((s.picks[user]||{})[ph.id]||{}).length;});
  return n;
}

function rankPosition(user){
  const s=getState();
  const scores=Object.keys(s.users).map(u=>({u,pts:calcPoints(u).total}));
  scores.sort((a,b)=>b.pts-a.pts);
  const pos=scores.findIndex(s=>s.u===user);
  return pos===-1?'—':'#'+(pos+1);
}

function renderUserPuntos(){
  const{total,detail}=calcPoints(currentUser);
  let html=`<div class="stats-grid">
    <div class="stat-box"><div class="stat-val">${total}</div><div class="stat-lbl">Puntos</div></div>
    <div class="stat-box"><div class="stat-val">${countPicks(currentUser)}</div><div class="stat-lbl">Picks</div></div>
    <div class="stat-box"><div class="stat-val">${rankPosition(currentUser)}</div><div class="stat-lbl">Posición</div></div>
  </div>`;
  const s=getState();
  let hasAny=false;
  PHASES.forEach(ph=>{
    const results=(s.results||{})[ph.id]||{};
    const picks=(s.picks[currentUser]||{})[ph.id]||{};
    if(!Object.keys(results).length)return;
    hasAny=true;
    html+=`<div class="panel"><div class="panel-title">${ph.label} <span style="font-size:15px;color:#4a6a35;letter-spacing:1px;">· ${detail[ph.id]} pts</span></div>`;
    MATCHES[ph.id].forEach((m,i)=>{
      const r=results[i],p=picks[i];
      if(!r)return;
      const hit=p&&p===r;
      html+=`<div class="match-row"><span class="t-local">${m[0]}</span><span class="t-vs">vs</span><span class="t-visit">${m[1]}</span><div class="result-display">
        <span class="pill pill-${r}">${r==='L'?'LOCAL':r==='E'?'EMPATE':'VISITA'}</span>
        ${p?`<span class="pill ${hit?'pill-ok':'pill-miss'}">${p}</span>`:`<span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#333;">—</span>`}
      </div></div>`;
    });
    html+=`</div>`;
  });
  if(!hasAny)html+=`<div class="panel" style="color:#4a6a35;font-family:'Share Tech Mono',monospace;font-size:13px;">Sin resultados publicados aún.</div>`;
  document.getElementById('user-puntos-content').innerHTML=html;
}

function renderRanking(containerId,admin){
  const s=getState();
  const users=Object.keys(s.users);
  const scores=users.map(u=>({u,pts:calcPoints(u).total,picks:countPicks(u)}));
  scores.sort((a,b)=>b.pts-a.pts||b.picks-a.picks);
  const medals=['🥇','🥈','🥉'];
  let html=`<div class="panel">`;
  if(!scores.length)html+=`<div style="color:#4a6a35;font-family:'Share Tech Mono',monospace;font-size:13px;">Sin participantes aún.</div>`;
  scores.forEach((sc,i)=>{
    const isMe=!admin&&sc.u===currentUser;
    html+=`<div class="rank-row${isMe?' rank-me':''}">
      <span class="rank-pos">${medals[i]||i+1}</span>
      <span class="rank-name">${sc.u}${isMe?' <span style="font-family:Share Tech Mono,monospace;font-size:10px;color:var(--verde-claro);">(tú)</span>':''}</span>
      <span class="rank-pts">${sc.pts} pts</span>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById(containerId).innerHTML=html;
}

function renderAdminResults(){
  const ph=adminPhase;
  const s=getState();
  const results=(s.results||{})[ph]||{};
  const phInfo=PHASES.find(p=>p.id===ph);
  let html=`<div class="panel"><div class="panel-title">Resultados reales · ${ph}</div>`;
  html+=`<div class="date-tag">📅 ${phInfo.date}</div>`;
  MATCHES[ph].forEach((m,i)=>{
    const r=results[i];
    html+=`<div class="match-row"><span class="t-local">${m[0]}</span><span class="t-vs">vs</span><span class="t-visit">${m[1]}</span><div class="bet-btns">
      <button class="bet-btn${r==='L'?' sel-L':''}" onclick="setResult('${ph}',${i},'L')">L</button>
      <button class="bet-btn${r==='E'?' sel-E':''}" onclick="setResult('${ph}',${i},'E')">E</button>
      <button class="bet-btn${r==='V'?' sel-V':''}" onclick="setResult('${ph}',${i},'V')">V</button>
    </div></div>`;
  });
  html+=`<button class="btn btn-verde btn-full" onclick="saveAdminResults()">▶ Guardar resultados</button>`;
  html+=`<div class="saved-msg" id="admin-save-msg"></div></div>`;
  document.getElementById('admin-results-content').innerHTML=html;
}

function setResult(ph,idx,val){
  const s=getState();
  if(!s.results)s.results={};
  if(!s.results[ph])s.results[ph]={};
  if(s.results[ph][idx]===val)delete s.results[ph][idx];
  else s.results[ph][idx]=val;
  saveState(s);
  renderAdminResults();
}

function saveAdminResults(){
  const el=document.getElementById('admin-save-msg');
  if(el){el.textContent='✓ Resultados guardados';setTimeout(()=>{el.textContent='';},2500);}
}

function renderAdminParticipants(){
  const s=getState();
  const users=Object.keys(s.users);
  let html=`<div class="panel"><div class="panel-title">${users.length} Participantes</div>`;
  if(!users.length)html+=`<div style="color:#4a6a35;font-family:'Share Tech Mono',monospace;font-size:13px;">Sin participantes aún.</div>`;
  users.forEach(u=>{
    const pts=calcPoints(u).total;
    const picks=countPicks(u);
    html+=`<div class="part-row">
      <span class="part-name">${u}</span>
      <span class="part-info">${picks} picks · ${pts} pts</span>
      <button class="btn btn-rojo btn-sm" onclick="deleteUser('${u}')">Eliminar</button>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById('admin-participants-content').innerHTML=html;
}

function deleteUser(name){
  if(!confirm('¿Eliminar a '+name+'? Esta acción no se puede deshacer.'))return;
  const s=getState();
  delete s.users[name];
  delete s.picks[name];
  saveState(s);
  renderAdminParticipants();
}

// Enter on inputs
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const active=document.querySelector('.screen.active');
    if(active.id==='screen-login')doLogin();
    if(active.id==='screen-register')doRegister();
    if(active.id==='screen-admin-login')doAdminLogin();
  }
});
</script>
